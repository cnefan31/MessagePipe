name: publish-aot-nuget

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "tag: git tag you want create. (sample 1.0.0)"
        required: true
      dry-run:
        description: "dry-run: true will never create release/nuget."
        required: true
        default: false
        type: boolean

jobs:
  build-dotnet:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
      
      # Build PostBuildUtility first
      - run: dotnet build ./tools/PostBuildUtility/ -c Release
      
      # Build all AOT packages (only fully AOT-compatible ones)
      - run: dotnet build -c Release -p:Version=${{ inputs.tag }} ./src/MessagePipe/MessagePipe.csproj ./src/MessagePipe.SourceGenerator/MessagePipe.SourceGenerator.csproj ./src/MessagePipe.Interprocess/MessagePipe.Interprocess.csproj ./src/MessagePipe.Analyzer/MessagePipe.Analyzer.csproj
      
      # Run tests (optional, can be skipped for AOT-only publish)
      - run: dotnet test -c Release --no-build --filter "FullyQualifiedName~Aot"
      
      # Pack only AOT-compatible packages
      - run: |
          dotnet pack ./src/MessagePipe/MessagePipe.csproj -c Release --no-build -p:Version=${{ inputs.tag }} -p:IncludeSymbols=true -o ./publish
          dotnet pack ./src/MessagePipe.SourceGenerator/MessagePipe.SourceGenerator.csproj -c Release --no-build -p:Version=${{ inputs.tag }} -p:IncludeSymbols=true -o ./publish
          dotnet pack ./src/MessagePipe.Interprocess/MessagePipe.Interprocess.csproj -c Release --no-build -p:Version=${{ inputs.tag }} -p:IncludeSymbols=true -o ./publish
          dotnet pack ./src/MessagePipe.Analyzer/MessagePipe.Analyzer.csproj -c Release --no-build -p:Version=${{ inputs.tag }} -p:IncludeSymbols=true -o ./publish
      
      # List generated packages
      - run: |
          echo "✅ AOT-compatible packages to publish:"
          ls -la ./publish/
          echo ""
          echo "❌ Excluded packages (not fully AOT-compatible):"
          echo "  - MessagePipe.Redis (StackExchange.Redis not AOT-compatible)"
          echo "  - MessagePipe.Nats (AlterNats deprecated, use nats.net.v2)"
          echo ""
          echo "📦 Package names (MyMessagePipe.*.Aot):"
          echo "  - MyMessagePipe.Aot"
          echo "  - MyMessagePipe.SourceGenerator.Aot"
          echo "  - MyMessagePipe.Interprocess.Aot"
          echo "  - MyMessagePipe.Analyzer.Aot"
      
      # Store artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-aot
          path: ./publish/*.nupkg
          if-no-files-found: error
          retention-days: 7

  publish:
    name: "Publish AOT NuGet packages"
    needs: [build-dotnet]
    permissions:
      contents: read
      id-token: write # required for NuGet Trusted Publishers
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: nuget-publish
      url: https://www.nuget.org/packages?q=MyMessagePipe.Aot
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      
      - name: Download AOT packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-aot
          path: ./publish
      
      - name: Show packages to publish
        run: ls -la ./publish/
      
      # Method 1: Using NuGet Trusted Publishers (Recommended)
      # This uses OIDC authentication and doesn't require storing API keys
      - name: NuGet login (OIDC - Trusted Publishers)
        uses: NuGet/login@v1
        id: login-oidc
        continue-on-error: true
        with:
          user: ${{ secrets.NUGET_USER }}
      
      - name: Push AOT packages (OIDC)
        if: ${{ !inputs.dry-run && steps.login-oidc.outcome == 'success' }}
        run: |
          for package in ./publish/*.nupkg; do
            echo "Pushing $package..."
            dotnet nuget push "$package" --skip-duplicate -s https://api.nuget.org/v3/index.json
          done
      
      # Method 2: Using API Key (Fallback)
      # Use this if OIDC is not configured
      - name: Push AOT packages (API Key)
        if: ${{ !inputs.dry-run && steps.login-oidc.outcome != 'success' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Please configure it in repository settings."
            exit 1
          fi
          for package in ./publish/*.nupkg; do
            echo "Pushing $package..."
            dotnet nuget push "$package" --skip-duplicate -s https://api.nuget.org/v3/index.json -k "$NUGET_API_KEY"
          done
      
      # Dry run notification
      - name: Dry run notification
        if: ${{ inputs.dry-run }}
        run: |
          echo "🔍 DRY RUN MODE - No packages were published"
          echo "Packages ready for publishing:"
          ls -1 ./publish/*.nupkg
